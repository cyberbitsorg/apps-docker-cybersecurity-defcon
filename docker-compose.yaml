services:

  postgres:
    image: postgres:16-alpine
    container_name: defcon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: defcon_db
      POSTGRES_USER: defcon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defcon -d defcon_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: defcon_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  news-aggregator:
    build:
      context: ./services/news-aggregator
      dockerfile: Dockerfile
    container_name: defcon_aggregator
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://defcon:${POSTGRES_PASSWORD}@postgres:5432/defcon_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_GATEWAY_URL: http://api-gateway:4000
      FETCH_INTERVAL_MINUTES: "${FETCH_INTERVAL_MINUTES:-60}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: defcon_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://defcon:${POSTGRES_PASSWORD}@postgres:5432/defcon_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AGGREGATOR_URL: http://news-aggregator:8000
      PORT: "4000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: defcon_frontend
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - external

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
